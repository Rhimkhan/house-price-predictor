name: 🚀 House Price Prediction CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  # Job 1: Lint & Code Quality
  # ──────────────────────────────────────────
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Check formatting (black)
        run: black --check src/ --line-length 100
        continue-on-error: true

      - name: Check imports (isort)
        run: isort --check-only src/
        continue-on-error: true

      - name: Lint (flake8)
        run: flake8 src/ --max-line-length=105 --ignore=E203,W503
        continue-on-error: true

  # ──────────────────────────────────────────
  # Job 2: Unit Tests
  # ──────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn xgboost lightgbm catboost \
                      matplotlib seaborn joblib scipy tqdm pytest pytest-cov flask

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=src --cov-report=term-missing \
            --cov-report=xml:outputs/coverage.xml \
            --cov-fail-under=60
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: outputs/coverage.xml

  # ──────────────────────────────────────────
  # Job 3: Build Docker Image
  # ──────────────────────────────────────────
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t house-price-prediction:latest .

      - name: Test Docker container starts
        run: |
          docker run -d -p 5000:5000 --name test-container house-price-prediction:latest
          sleep 10
          curl -f http://localhost:5000/health || echo "Health check failed (no model loaded)"
          docker stop test-container
        continue-on-error: true

  # ──────────────────────────────────────────
  # Job 4: Validate Project Structure
  # ──────────────────────────────────────────
  validate:
    name: 📁 Validate Structure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          required_files=(
            "requirements.txt"
            "README.md"
            "run_pipeline.py"
            "app.py"
            "Dockerfile"
            "config.yaml"
            "setup.py"
            "src/data_preprocessing.py"
            "src/feature_engineering.py"
            "src/model_training.py"
            "src/predict.py"
            "src/model_explainer.py"
            "src/performance_monitor.py"
            "templates/index.html"
            "templates/result.html"
            "tests/test_model.py"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              exit 1
            fi
            echo "✅ Found: $f"
          done

      - name: Check Python syntax
        run: |
          python -m py_compile src/data_preprocessing.py
          python -m py_compile src/feature_engineering.py
          python -m py_compile src/model_training.py
          python -m py_compile src/predict.py
          python -m py_compile src/model_explainer.py
          python -m py_compile src/performance_monitor.py
          python -m py_compile app.py
          python -m py_compile run_pipeline.py
          echo "✅ All Python files syntax OK"
